name: Deploy FastAPI App via Self-Hosted Runner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  # Self-hosted GitHub runner
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          echo "Building latest Docker image..."
          sudo docker build --no-cache -t Intellistay-ai-backend-image .

      - name: Stop & Remove Existing Container
        run: |
          CONTAINER_ID=$(sudo docker ps -aq --filter "name=Intellistay-ai-backend-container")
          if [ ! -z "$CONTAINER_ID" ]; then
            sudo docker stop Intellistay-ai-backend-container
            sudo docker rm Intellistay-ai-backend-container
          fi

      - name: Run New Container from Latest Image
        run: |
          echo "Running container from latest image..."
          sudo docker run -d --name Intellistay-ai-backend-container -p 8000:8000 Intellistay-ai-backend-image

      - name: Cleanup Unused Docker Images
        run: |
          echo "Cleaning up old Docker images..."
          sudo docker image prune -af

  nginx:
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Test and Reload Nginx
        run: |
          echo "Testing nginx configuration..."
          sudo nginx -t && sudo systemctl restart nginx
